<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>normal workbench / pamphlet</title>
  <link rel="stylesheet" href="/workbench-assets/workbench.css">
</head>
<body>
  <div class="wb-shell">
    <header class="wb-topbar">
      <div class="wb-brand">
        <div class="wb-kicker">normal</div>
        <div class="wb-title">Pamphlet Workbench</div>
      </div>
      <div class="wb-source">
        <label class="wb-label" for="sourcePath">Source</label>
        <input id="sourcePath" type="text" placeholder="/path/to/library">
      </div>
      <div class="wb-nav" id="pageNav"></div>
      <div class="wb-run">
        <button id="runButton" class="wb-btn wb-btn-primary">Run</button>
      </div>
      <div class="wb-activity">
        <div class="wb-activity-line">
          <span class="wb-status-dot" id="statusDot"></span>
          <span id="statusText">Idle.</span>
          <span class="wb-status-timer" id="statusTimer"></span>
        </div>
        <div class="wb-activity-detail" id="activityDetail">No normal job or media probe detected for the selected source.</div>
      </div>
    </header>

    <div class="wb-ribbon" id="contextRibbon"></div>

    <main class="wb-frame">
      <aside class="wb-sliver wb-sliver-left">
        <div class="wb-sliver-head">
          <div>
            <div class="wb-kicker">Upstream Context</div>
            <h2>Source & Flow</h2>
          </div>
        </div>
        <div id="sliverContent" class="wb-sliver-body"></div>
        <button id="fileTreeToggle" class="wb-sliver-toggle">Reveal File Tree</button>
        <div id="fileTreePanel" class="wb-tree-panel wb-tree-panel-hidden"></div>
      </aside>

      <section class="wb-surface wb-primary">
        <div class="wb-surface-head">
          <div class="wb-surface-group">
            <div class="wb-surface-parent">Primary Surface</div>
            <h2 id="primaryTitle">Inspection & Proposal</h2>
          </div>
          <div class="wb-surface-note" id="primaryNote"></div>
        </div>
        <div id="primaryContent" class="wb-surface-body"></div>
      </section>

      <section class="wb-surface wb-secondary">
        <div class="wb-surface-head">
          <div class="wb-surface-group">
            <div class="wb-surface-parent">Secondary Surface</div>
            <h2 id="secondaryTitle">Output Preview</h2>
          </div>
          <div class="wb-surface-actions" id="secondaryModes"></div>
        </div>
        <div id="secondaryActionBar" class="wb-secondary-actionbar"></div>
        <div id="secondaryContent" class="wb-surface-body"></div>
      </section>

      <aside class="wb-sliver wb-sliver-right">
        <div class="wb-sliver-head">
          <div>
            <div class="wb-kicker">Downstream Ledger</div>
            <h2>Audit</h2>
          </div>
          <button id="auditToggle" class="wb-audit-toggle">Expand</button>
        </div>
        <div id="auditRailContent" class="wb-sliver-body"></div>
      </aside>
    </main>
  </div>
  <script>__NORMAL_BOOTSTRAP__</script>
  <script src="/workbench-assets/workbench.js"></script>
</body>
</html>
