<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>normal workbench</title>
  <link rel="stylesheet" href="/assets/workbench.css">
</head>
<body>
  <div class="lab-shell" data-layout-mode="2-page-lopsided">
    <header class="lab-topbar">
      <div>
        <div class="lab-kicker">alpha.5 workbench</div>
        <div class="lab-workflow-switch">
          <button id="workflowButton" class="lab-workflow-button" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span id="workflowTitle">Normalize Movie Library Naming</span>
            <span class="lab-workflow-caret" aria-hidden="true">▾</span>
          </button>
          <div id="workflowMenu" class="lab-workflow-menu" role="listbox" hidden>
            <button id="workflowNormalize" class="lab-workflow-option" type="button" data-workflow="normalize" role="option">Normalize Movie Library Naming</button>
            <button id="workflowJunk" class="lab-workflow-option" type="button" data-workflow="junk" role="option">Remove Junk Files</button>
            <button id="workflowWeakEncodes" class="lab-workflow-option" type="button" data-workflow="weak-encodes" role="option">Review Low-Quality Encodes</button>
            <button id="workflowRepairDefaults" class="lab-workflow-option" type="button" data-workflow="repair-defaults" role="option">Fix Audio and Subtitle Defaults</button>
            <button id="workflowCanonicalLists" class="lab-workflow-option" type="button" data-workflow="canonical-lists" role="option">Compare Against Canonical Lists</button>
          </div>
        </div>
        <p id="workflowDescription">Normalize diagnostics with row reasoning and direct confirm/apply.</p>
      </div>
      <div class="lab-controls">
        <label for="sourcePath">Source</label>
        <input id="sourcePath" type="text" placeholder="/path/to/library">
        <button id="runButton">Run Normalize Movie Library Naming</button>
      </div>
    </header>

    <section id="filterBar" class="lab-filters">
      <input id="searchInput" type="search" placeholder="Search current or projected path">
      <select id="bucketFilter">
        <option value="all">all</option>
        <option value="actionable">actionable</option>
        <option value="unchanged">unchanged</option>
        <option value="safe">safe</option>
        <option value="review">review</option>
      </select>
      <select id="workflowStatusFilter" hidden>
        <option value="all">all</option>
        <option value="delete-candidates">delete candidates</option>
        <option value="review">review</option>
        <option value="queued">queued</option>
      </select>
      <select id="canonicalListFilter" aria-label="Canonical list" hidden>
        <option value="top_100">Top 100</option>
        <option value="top_250">Top 250</option>
        <option value="top_500">Top 500</option>
        <option value="animation">Animation</option>
        <option value="sci_fi">Sci-Fi</option>
        <option value="fantasy">Fantasy</option>
        <option value="action">Action</option>
        <option value="thriller_mystery">Thriller / Mystery</option>
        <option value="drama_romance">Drama / Romance</option>
        <option value="documentary">Documentary</option>
        <option value="comedy">Comedy</option>
        <option value="anime" disabled>Anime</option>
        <option value="tv_shows" disabled>TV Shows</option>
      </select>
      <button id="selectAllButton" type="button">Select all</button>
      <button id="deselectAllButton" type="button">Deselect all</button>
    </section>

    <main class="lab-layout">
      <div class="lab-sliver-slot">
        <aside class="lab-sliver">
          <div class="lab-sliver-stack">
            <button id="policyToggle" class="lab-sliver-toggle" type="button" aria-label="Open Policy" title="Open Policy"></button>
            <div class="lab-sliver-separator" aria-hidden="true"></div>
            <button id="dashboardToggle" class="lab-sliver-toggle" type="button" aria-label="Open Dashboard" title="Open Dashboard"></button>
            <div class="lab-sliver-separator" aria-hidden="true"></div>
            <button id="auditToggle" class="lab-sliver-toggle" type="button" aria-label="Open Audit" title="Open Audit"></button>
            <div class="lab-sliver-separator" aria-hidden="true"></div>
            <button id="placeholderToggle" class="lab-sliver-toggle" type="button" aria-label="Placeholder" title="Placeholder" disabled></button>
            <div class="lab-sliver-separator" aria-hidden="true"></div>
            <button id="placeholderDownloadToggle" class="lab-sliver-toggle" type="button" aria-label="Placeholder" title="Placeholder" disabled></button>
            <div class="lab-sliver-separator" aria-hidden="true"></div>
            <button id="placeholderSettingsToggle" class="lab-sliver-toggle" type="button" aria-label="Placeholder" title="Placeholder" disabled></button>
          </div>
          <div id="policyRail" class="lab-sliver-body"></div>
        </aside>
      </div>
      <section class="lab-page lab-page-scan" data-page-role="scan" data-collapse-mode="reflow" data-panel-state="expanded">
        <div class="lab-page-frame">
          <section id="scanTablePanel" class="lab-table-panel lab-rhythm-surface" data-rhythm-surface="rows">
            <table class="lab-scan-table">
              <colgroup id="tableColGroup"></colgroup>
              <thead>
                <tr id="tableHeaderRow">
                  <th></th>
                  <th><button class="sort" data-sort="current_value">File Name</button></th>
                  <th><button class="sort" data-sort="projected_path">Projected Path</button></th>
                  <th><button class="sort" data-sort="confidence">Confidence</button></th>
                  <th><button class="sort" data-sort="reason_bucket">Reason Bucket</button></th>
                </tr>
              </thead>
              <tbody id="rowsBody"></tbody>
            </table>
          </section>
          <section id="dashboardPanel" class="lab-panel lab-policy-panel lab-dashboard-panel" hidden></section>
          <section id="policyEditorPanel" class="lab-panel lab-policy-panel" hidden></section>
          <section id="auditPanel" class="lab-panel lab-audit-panel" hidden></section>
        </div>
      </section>
      <aside class="lab-page lab-page-preview" data-page-role="preview" data-collapse-mode="anchored-slot" data-panel-state="expanded">
        <div class="lab-page-frame">
          <div class="lab-detail">
            <div class="lab-panel">
              <div class="lab-panel-header">
                <div class="lab-panel-copy">
                  <div id="previewPanelKicker" class="lab-panel-kicker">Downstream Preview</div>
                  <div id="previewPanelHeading" class="lab-panel-heading">Projected Output</div>
                </div>
                <div id="previewControls" class="lab-preview-controls" hidden>
                  <div id="repairActionControls" class="lab-preview-group" hidden>
                    <button id="repairActionButton" class="lab-action-button" type="button">Run Repair</button>
                    <div class="lab-preview-select-group">
                      <label for="repairActionSelect">Action</label>
                      <select id="repairActionSelect"></select>
                    </div>
                  </div>
                  <button id="confirmButton" class="lab-confirm-button" type="button" disabled>Confirm (0 Operations)</button>
                </div>
              </div>
              <div id="previewPane" class="lab-pane lab-preview-pane lab-rhythm-surface" data-rhythm-surface="rows"></div>
              <div id="inspectionPane" class="lab-pane lab-preview-pane lab-rhythm-surface" data-rhythm-surface="rows" hidden></div>
            </div>
          </div>
        </div>
      </aside>
    </main>
  </div>
  <div id="trackPopover" class="lab-audio-popover" hidden></div>
  <div id="repairLockOverlay" class="lab-repair-lock-overlay" hidden aria-hidden="true">
    <div class="lab-repair-lock-block lab-repair-lock-block-top"></div>
    <div class="lab-repair-lock-block lab-repair-lock-block-right"></div>
    <div class="lab-repair-lock-block lab-repair-lock-block-bottom"></div>
    <div class="lab-repair-lock-block lab-repair-lock-block-left"></div>
    <div class="lab-repair-lock-port-frame" aria-hidden="true"></div>
    <div class="lab-repair-lock-banner">
      <strong>Safe lock active.</strong>
      <span>ffmpeg remux is in flight. Preview stays open; the rest of the workbench is paused.</span>
    </div>
  </div>
  <script>__NORMAL_BOOTSTRAP__</script>
  <script src="/assets/workbench.js"></script>
</body>
</html>
